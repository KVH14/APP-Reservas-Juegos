spring.application.name=juegos

# MySQL local y railway
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/playresdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC} 
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}                            
spring.datasource.password=${MYSQL_ROOT_PASSWORD:root} 

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# RAWG API
rawg.api.key=400cc619f51f4b18b3c201a5670d7fdc
rawg.api.url=https://api.rawg.io/api

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:tu_correo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
